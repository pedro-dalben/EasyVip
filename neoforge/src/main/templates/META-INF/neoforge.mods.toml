modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"

description='''
easyVip is a modern server-side VIP management mod for NeoForge.
It supports custom VIP tiers, key activation, reward packages, and variants selection.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="ftbranks"
    type="optional"
    versionRange=""
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="luckperms"
    type="optional"
    versionRange=""
    ordering="AFTER"
    side="BOTH"
